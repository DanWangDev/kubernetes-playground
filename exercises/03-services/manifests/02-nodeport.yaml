# NodePort Service: exposes nginx on every node's IP at a static port.
# Access from host: curl http://localhost:<nodePort>
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
  namespace: playground
spec:
  type: NodePort
  selector:
    app: nginx-svc-demo
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
