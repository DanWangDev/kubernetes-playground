# Multi-container Pod: nginx + busybox sidecar.
# Both containers share the same network namespace (localhost)
# and can share volumes. The sidecar watches nginx logs.
apiVersion: v1
kind: Pod
metadata:
  name: multi-container
  namespace: playground
  labels:
    app: multi-container-demo
spec:
  containers:
  # Main container: serves HTTP
  - name: nginx
    image: nginx:alpine
    ports:
    - containerPort: 80

  # Sidecar container: watches nginx access log
  - name: log-watcher
    image: busybox
    command: ["sh", "-c"]
    args:
    - |
      echo "Log watcher started. Waiting for traffic..."
      tail -f /var/log/nginx/access.log 2>/dev/null || echo "(access.log will appear after first request)"

  # Sidecar container: keeps the pod alive for inspection
  - name: debugger
    image: busybox
    command: ["sh", "-c"]
    args:
    - |
      echo "Debugger container ready."
      echo "Try: wget -q -O- http://localhost:80"
      sleep 3600
