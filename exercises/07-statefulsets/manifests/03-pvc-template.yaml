# StatefulSet with per-pod PVC template.
# Each pod gets its own PVC: data-nginx-sts-pvc-0, data-nginx-sts-pvc-1, ...
# PVCs survive pod deletion and StatefulSet scale-down.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nginx-sts-pvc
  namespace: playground
spec:
  serviceName: nginx-sts-svc
  replicas: 2
  selector:
    matchLabels:
      app: nginx-sts-pvc
  template:
    metadata:
      labels:
        app: nginx-sts-pvc
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 100Mi
