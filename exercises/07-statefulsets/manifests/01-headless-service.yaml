# Headless Service required by StatefulSets for stable network identity.
# clusterIP: None means DNS returns individual Pod IPs, not a virtual IP.
apiVersion: v1
kind: Service
metadata:
  name: nginx-sts-svc
  namespace: playground
  labels:
    app: nginx-sts
spec:
  clusterIP: None
  selector:
    app: nginx-sts
  ports:
  - port: 80
    targetPort: 80
