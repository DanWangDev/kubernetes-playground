# Parallel Job: 5 completions with 2 workers running concurrently.
# Total wall time ≈ ceil(5/2) × per-task-time instead of 5 × per-task-time.
apiVersion: batch/v1
kind: Job
metadata:
  name: parallel-job
  namespace: playground
spec:
  completions: 5
  parallelism: 2
  ttlSecondsAfterFinished: 60
  template:
    spec:
      containers:
      - name: worker
        image: busybox
        command: ["sh", "-c", "echo 'Worker processing...'; sleep 2; echo 'Done!'"]
      restartPolicy: Never
