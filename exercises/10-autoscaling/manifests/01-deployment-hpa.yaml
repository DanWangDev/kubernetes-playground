# Deployment for HPA demo: CPU request set to 100m.
# HPA requires resource requests as a baseline for percentage calculations.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-demo
  namespace: playground
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpa-demo
  template:
    metadata:
      labels:
        app: hpa-demo
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
