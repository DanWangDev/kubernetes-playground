# Pod with affinity: prefers to co-locate with pods labeled app=cache.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-with-affinity
  namespace: playground
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-affinity
  template:
    metadata:
      labels:
        app: web-affinity
    spec:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: cache
              topologyKey: kubernetes.io/hostname
      containers:
      - name: nginx
        image: nginx:alpine
