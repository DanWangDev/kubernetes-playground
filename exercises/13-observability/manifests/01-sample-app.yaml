# Sample application for observability demos.
# Writes structured JSON logs to stdout.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obs-demo
  namespace: playground
spec:
  replicas: 2
  selector:
    matchLabels:
      app: obs-demo
  template:
    metadata:
      labels:
        app: obs-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
