name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go vet ./...

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Create kind cluster
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind
          ./kind create cluster --name playground --wait 3m
          kubectl cluster-info

      - name: Build
        run: go build ./...

      - name: Run all exercises (integration smoke test)
        run: |
          set -e
          for dir in exercises/*/; do
            if [ -f "${dir}main.go" ]; then
              echo "::group::Running $(basename $dir)"
              go run "./${dir}" --step=false || { echo "::error::$(basename $dir) failed"; exit 1; }
              echo "::endgroup::"
            fi
          done

      - name: Run tests
        run: go test ./test/... -v -count=1 -race

      - name: Coverage
        if: matrix.go-version == '1.23'
        run: go test ./test/... -cover -coverprofile=coverage.out
